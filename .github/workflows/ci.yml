name: Nexus CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  POSTGRES_USER: nexus
  POSTGRES_PASSWORD: nexus_ci_2024
  POSTGRES_DB: nexus_notebook_11_test
  DATABASE_URL: postgresql+asyncpg://nexus:nexus_ci_2024@localhost:5432/nexus_notebook_11_test
  JWT_SECRET: ci-jwt-secret-32-bytes-long!!!!!
  CSRF_SECRET: ci-csrf-secret-32-bytes-long!!!!
  ENCRYPTION_KEY: ci-encryption-key-32-bytes!!!!!!

jobs:
  # ── Lint & Type Check ────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Batch 5 complete — full-tree enforcement
      # Zero tolerance: no suppression without comment
      - name: Lint (Ruff)
        run: |
          ruff check src/ tests/ --output-format=github
          ruff format src/ tests/ --check

      # Batch 5 complete — full-tree enforcement
      # Zero tolerance: no suppression without comment
      - name: Type check (MyPy)
        run: |
          mypy src/ --ignore-missing-imports \
            --no-error-summary

  # ── Unit Tests ───────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Coverage gate: 65% on testable modules
      # Excluded: infrastructure-bound modules
      # (see docs/coverage-rationale.md)
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-fail-under=65 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=results-unit.xml \
            -q \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ── Integration Tests ──────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    continue-on-error: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply database schema
        run: |
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql \
            -h localhost \
            -U ${{ env.POSTGRES_USER }} \
            -d ${{ env.POSTGRES_DB }} \
            -f database/schema/001_initial.sql

      - name: Install psycopg2 for seed script
        run: pip install psycopg2-binary

      - name: Seed test data
        run: python -m database.seeds.seed_models
        continue-on-error: true
        env:
          ENVIRONMENT: testing

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            --junitxml=results-integration.xml
        env:
          ENVIRONMENT: testing
          REDIS_URL: redis://localhost:6379/1
          DATABASE_URL: postgresql+asyncpg://nexus:nexus_ci_2024@localhost:5432/nexus_notebook_11_test
          JWT_SECRET: test-jwt-secret-32-bytes-long!!!
          CSRF_SECRET: test-csrf-secret-32-bytes!!!!!!!
          ENCRYPTION_KEY: test-encryption-key-32-bytes!!!!

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage-integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            results-unit.xml
            results-integration.xml

  # ── Build Frontend ─────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/

  # ── Docker Build ───────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-integration, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: nexus-notebook:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan ──────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Bandit security scan
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-results.json

      - name: Check for dependency vulnerabilities
        run: pip-audit

      - name: Upload security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-results
          path: bandit-results.json
