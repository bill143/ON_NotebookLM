services:
  # ── Application (FastAPI) ───────────────────────
  nexus-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: production
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql+asyncpg://nexus:${POSTGRES_PASSWORD:-nexus_dev_2024}@postgres:5432/nexus_notebook_11
      - REDIS_URL=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - nexus-storage:/app/storage
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Celery Worker (Async Tasks) ─────────────────
  nexus-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: production
    command: >
      celery -A src.worker worker
      --loglevel=info
      --concurrency=4
      --queues=default,source_processing,artifact_generation,embedding
      --pool=prefork
    env_file:
      - ../.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql+asyncpg://nexus:${POSTGRES_PASSWORD:-nexus_dev_2024}@postgres:5432/nexus_notebook_11
      - REDIS_URL=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - nexus-storage:/app/storage
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Celery Beat (Scheduled Tasks) ───────────────
  nexus-beat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: production
    command: >
      celery -A src.worker beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    env_file:
      - ../.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Flower (Celery Monitor) ─────────────────────
  nexus-flower:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: production
    command: celery -A src.worker flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Database ────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexus_notebook_11
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_dev_2024}
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='cp %p /backups/wal/%f'
      -c max_wal_senders=3
      -c wal_keep_size=512
    volumes:
      - nexus-pgdata:/var/lib/postgresql/data
      - ../database/schema/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_notebook_11"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Postgres Backup Sidecar ────────────────────
  nexus-backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-nexus_dev_2024}
    entrypoint: >
      sh -c "
      while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h postgres -U nexus -d nexus_notebook_11 -Fc -f /backups/nexus_$$TIMESTAMP.dump
        && echo \"Backup complete: nexus_$$TIMESTAMP.dump\"
        && find /backups -maxdepth 1 -name '*.dump' -mtime +7 -delete
        && echo \"Old backups pruned\";
        sleep 3600;
      done"
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Cache / Broker ──────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy volatile-lru --appendonly yes
    volumes:
      - nexus-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - nexus-prometheus:/prometheus
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Redis Exporter (Prometheus) ────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Postgres Exporter (Prometheus) ────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://nexus:${POSTGRES_PASSWORD:-nexus_dev_2024}@postgres:5432/nexus_notebook_11?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Grafana ─────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - nexus-grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Local AI (Optional) ─────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - nexus-ollama:/root/.ollama
    profiles:
      - local-ai
    restart: unless-stopped

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi:latest
    ports:
      - "8880:8880"
    profiles:
      - local-ai
    restart: unless-stopped

  # ── Next.js Frontend ────────────────────────────
  nexus-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://nexus-api:8000
      - NEXT_PUBLIC_WS_URL=ws://nexus-api:8000
    depends_on:
      nexus-api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - frontend

volumes:
  nexus-pgdata:
  nexus-redis:
  nexus-storage:
  nexus-ollama:
  nexus-prometheus:
  nexus-grafana:
