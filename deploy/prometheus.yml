global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nexus-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["nexus-api:8000"]
    scrape_interval: 10s

  - job_name: "celery-flower"
    static_configs:
      - targets: ["nexus-flower:5555"]
    scrape_interval: 30s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s
