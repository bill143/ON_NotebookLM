# Nexus Notebook 11 LM — Alembic Configuration
# Codename: ESPERANTO

[alembic]
script_location = database/migrations
prepend_sys_path = .
version_path_separator = os

# Connection string — overridden at runtime from src.config
sqlalchemy.url = postgresql+asyncpg://nexus:nexus_dev_2024@localhost:5432/nexus_notebook_11

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
